name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.1.0 or v0.1.0-beta.1)'
        required: true
      prerelease:
        description: 'Is this a pre-release?'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            arch: x64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-2025
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Dawn
        run: |
          npm run build:release

      - name: Validate package
        run: |
          npm run package

      - name: Create tarball
        shell: bash
        run: |
          cd dist
          tar -czf ../electrobun-dawn-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electrobun-dawn-${{ matrix.platform }}-${{ matrix.arch }}
          path: electrobun-dawn-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease || contains(github.ref_name, '-beta') || contains(github.event.inputs.tag, '-beta') }}
          body: |
            electrobun-dawn release

            Pre-built binaries for:
            - **macOS** (arm64 & x64): `electrobun-dawn-darwin-[arch].tar.gz`
            - **Linux** (x64 & arm64): `electrobun-dawn-linux-[arch].tar.gz`
            - **Windows** (x64): `electrobun-dawn-win32-x64.tar.gz`

            ## Contents
            Each tarball contains:
            - `include/` (WebGPU headers)
            - `lib/` or `bin/` (Dawn shared library)
